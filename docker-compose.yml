services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crossword
      POSTGRES_USER: crossword
      POSTGRES_PASSWORD: crossword
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  python-dev:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
    volumes:
      - ./:/workspace
    working_dir: /workspace
    tty: true

  go-dev:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.golang
    volumes:
      - ./:/workspace
    working_dir: /workspace
    tty: true

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
    command: python3 -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
      - redis

  social-scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
    command: python3 services/social_bot/scheduler.py
    env_file: .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  social-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
    command: python3 services/social_bot/worker.py
    env_file: .env
    volumes:
      - ./:/workspace
      - ./data/media:/workspace/data/media
    working_dir: /workspace
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  redis_data: