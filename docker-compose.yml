services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crossword
      POSTGRES_USER: crossword
      POSTGRES_PASSWORD: crossword
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  python-dev:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
    volumes:
      - ./:/workspace
    working_dir: /workspace
    tty: true

  go-dev:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.golang
    volumes:
      - ./:/workspace
    working_dir: /workspace
    tty: true

  # Development services will be added as we build them
  # api:
  #   build: ./apps/api
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - redis

volumes:
  redis_data: