name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Focus on:
            - Correctness and logic errors
            - Go: golangci-lint compliance (govet, errcheck, staticcheck, goimports)
            - Python: Ruff (E, F, B rules) and Black compliance
            - Security: no command injection, SQL injection, or exposed secrets
            - Architecture: consistency with CLAUDE.md conventions
            Post inline comments on specific lines where relevant.
